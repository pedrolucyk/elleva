<title>Briefing Semanal — Clínica Elleva</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1E2530;color:#F0F4F8;padding:20px;min-height:100vh}

/* ── Header ── */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;padding:20px 24px;background:#2D3748;border-radius:14px;border-left:5px solid #3B82F6}
.hdr-left .clinic{font-size:12px;color:#A0AEC0;margin-bottom:4px}
.hdr-left .medico{font-size:22px;font-weight:700}
.hdr-left .esp{font-size:13px;color:#63B3ED;margin-top:4px;font-weight:600}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.badge{font-size:13px;color:#F0F4F8;background:#1E2530;padding:6px 14px;border-radius:20px;border:1px solid #4A5568}
.badge.atual{border-color:#3B82F6;color:#63B3ED}
.gen{font-size:11px;color:#718096}

/* ── Section headers ── */
.sec{margin-bottom:20px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#A0AEC0;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:#2D3748}

/* ── Cards ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:860px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:#2D3748;border-radius:12px;padding:18px;border-left:4px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.card.azul{border-left-color:#3B82F6}
.card.verde{border-left-color:#10B981}
.card.laranja{border-left-color:#F59E0B}
.card.roxo{border-left-color:#8B5CF6}
.clabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#A0AEC0;margin-bottom:8px}
.cval{font-size:32px;font-weight:700;line-height:1}
.csub{font-size:11px;color:#718096;margin-top:6px}
.cdelta{font-size:12px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:4px}
.cdelta.up{color:#10B981}
.cdelta.dn{color:#EF4444}
.cdelta.nu{color:#718096}

/* ── Row 2 colunas ── */
.row2{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:780px){.row2{grid-template-columns:1fr}}
.box{background:#2D3748;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.boxh{font-size:10px;font-weight:700;color:#A0AEC0;margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em}

/* ── Bar chart ── */
.bchart{display:flex;align-items:flex-end;gap:5px;height:100px;border-bottom:1px solid #4A5568;padding-bottom:6px;margin-bottom:8px}
.bbar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;gap:2px}
.bbar{width:100%;border-radius:4px 4px 0 0;min-height:3px}
.bbar.hist{background:linear-gradient(180deg,#4A6FA5,#2A4070)}
.bbar.ant{background:linear-gradient(180deg,#F6AD55,#C05621)}
.bbar.cur{background:linear-gradient(180deg,#68D391,#276749)}
.bval{font-size:11px;color:#A0AEC0;font-weight:600}
.blabel{font-size:9px;color:#718096;text-align:center;white-space:nowrap}
.blegenda{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.blg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#A0AEC0}
.blg-dot{width:10px;height:10px;border-radius:3px}

/* ── Mix ── */
.mix-item{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.mix-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.mix-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mix-bar-bg{width:75px;height:7px;background:#1E2530;border-radius:4px;overflow:hidden;flex-shrink:0}
.mix-bar-fill{height:100%;border-radius:4px}
.mix-pct{font-size:11px;color:#A0AEC0;width:28px;text-align:right;flex-shrink:0;font-weight:600}
.mix-delta{font-size:10px;width:32px;text-align:right;flex-shrink:0;font-weight:700}
.mix-delta.up{color:#10B981}
.mix-delta.dn{color:#EF4444}
.mix-delta.nu{color:#718096}

/* ── Agenda (semana atual) ── */
.agenda-box{background:#2D3748;border-radius:12px;margin-bottom:20px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.agenda-hdr{padding:14px 18px;background:#243044;border-bottom:1px solid #1E2530}
.agenda-hdr h3{font-size:14px;font-weight:700;color:#F0F4F8}
.agenda-hdr .sub{font-size:11px;color:#A0AEC0;margin-top:3px}
.day-block{border-bottom:1px solid #1E2530}
.day-block:last-child{border-bottom:none}
.day-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:#222E3F;cursor:pointer;user-select:none}
.day-hdr:hover{background:#263348}
.day-name{font-size:13px;font-weight:700;color:#F0F4F8}
.day-date{font-size:11px;color:#718096;margin-left:6px}
.day-meta{display:flex;gap:12px;font-size:11px;color:#A0AEC0}
.day-meta strong{color:#F0F4F8}
.day-appts{padding:4px 0}
.appt{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid #1E2530}
.appt:last-child{border-bottom:none}
.appt:hover{background:#243044}
.appt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.appt-time{font-size:13px;font-weight:700;min-width:42px;color:#F0F4F8}
.appt-dur{font-size:10px;color:#718096;min-width:36px}
.appt-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.appt-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.appt-badges{display:flex;gap:4px;flex-shrink:0}
.bdg{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700}
.bdg-tel{background:rgba(56,189,248,.15);color:#38BDF8}
.bdg-1a{background:rgba(167,139,250,.15);color:#A78BFA}

/* ── Semana anterior (comparação) ── */
.ant-box{background:#2D3748;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.ant-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:680px){.ant-grid{grid-template-columns:repeat(2,1fr)}}
.ant-stat{background:#1E2530;border-radius:10px;padding:14px;text-align:center}
.ant-stat-val{font-size:28px;font-weight:700;line-height:1}
.ant-stat-label{font-size:10px;color:#A0AEC0;margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
.ant-days{display:flex;flex-wrap:wrap;gap:8px}
.ant-day{background:#1E2530;border-radius:8px;padding:10px 14px;min-width:100px}
.ant-day-name{font-size:11px;color:#A0AEC0;margin-bottom:4px}
.ant-day-num{font-size:18px;font-weight:700;color:#F0F4F8}
.ant-day-sub{font-size:10px;color:#718096;margin-top:2px}

/* ── Próxima semana (preview) ── */
.prox-box{background:#2D3748;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.prox-num{font-size:48px;font-weight:700;color:#8B5CF6;line-height:1}
.prox-info{flex:1}
.prox-label{font-size:12px;color:#A0AEC0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.prox-period{font-size:14px;font-weight:600;color:#F0F4F8}
.prox-sub{font-size:12px;color:#718096;margin-top:4px}

/* ── Follow-ups ── */
.fu-box{background:#2D3748;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.fu-empty{text-align:center;padding:20px;color:#718096;font-size:13px}
.fu-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #1E2530}
.fu-item:last-child{border-bottom:none}
.fu-info{flex:1;min-width:0}
.fu-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fu-sub{font-size:12px;color:#718096;margin-top:3px}
.btn-wpp{background:#25D366;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap}
.btn-wpp:hover{background:#1daa55}

/* ── Footer ── */
.footer{text-align:center;color:#718096;font-size:11px;padding:16px 0;border-top:1px solid #2D3748;margin-top:8px}

.nodata{text-align:center;padding:28px;color:#718096;font-size:13px}
</style>

function fmtMin(min){if(!min||min===0)return '';const h=Math.floor(min/60),r=min%60;return r?(h?h+'h'+r+'min':r+'min'):(h+'h');}

const DIAS_FULL=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DIAS_LONG=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
function diaSem(dataStr,full){
  if(!dataStr)return '';
  const[d,m,y]=dataStr.split('-');
  const idx=new Date(+y,+m-1,+d).getDay();
  return full?DIAS_LONG[idx]:DIAS_FULL[idx];
}
function tagStyle(cor){return `background:${cor}25;color:${cor};border:1px solid ${cor}50`;}

const SCSS={'Atendido':'#10B981','Em atendimento':'#F59E0B','Aguardando':'#F59E0B',
  'Confirmado':'#3B82F6','Marcado':'#3B82F6','Não compareceu':'#EF4444',
  'Desmarcado (paciente)':'#EF4444','Desmarcado (profissional)':'#EF4444'};

function deltaHtml(n,sfx){
  if(n===null||n===undefined||n===0)return '<span class="cdelta nu">— sem alteração</span>';
  const s=(n>0?'↑ +':'↓ ')+Math.abs(n)+(sfx||'');
  return `<span class="cdelta ${n>0?'up':'dn'}">${s}</span>`;
}
function mixDeltaHtml(d){
  if(!d)return '<span class="mix-delta nu">—</span>';
  return `<span class="mix-delta ${d>0?'up':'dn'}">${d>0?'+':''}${d}%</span>`;
}

/* ── Header ── */
function renderHeader(){
  const s=D.semana_cur;
  return `<div class="hdr">
    <div class="hdr-left">
      <div class="clinic">📋 Briefing Semanal — Clínica Elleva</div>
      <div class="medico">${esc(D.medico)}</div>
      <div class="esp">${esc(D.especialidade)}</div>
    </div>
    <div class="hdr-right">
      <div class="badge atual">📅 Semana Atual: ${esc(s.inicio)} → ${esc(s.fim)}</div>
      <div class="gen">Gerado em ${esc(D.gerado_em)}</div>
    </div>
  </div>`;
}

/* ── Cards (4 comparações) ── */
function renderCards(){
  const st=D.stats;
  const taxa=st.taxa_ant!=null?`${st.taxa_ant}%`:'—';
  return `<div class="sec-title">📊 Comparativo — semana atual vs anterior</div>
  <div class="cards">
    <div class="card azul">
      <div class="clabel">Agendados — semana atual</div>
      <div class="cval" style="color:#3B82F6">${st.n_cur}</div>
      <div class="csub">vs ${st.n_ant} na semana anterior</div>
      ${deltaHtml(st.n_cur - st.n_ant)}
    </div>
    <div class="card verde">
      <div class="clabel">Atendidos — semana anterior</div>
      <div class="cval" style="color:#10B981">${st.atend_ant}</div>
      <div class="csub">de ${st.n_ant} agendados</div>
      ${deltaHtml(st.atend_ant - st.atend_hist)}
    </div>
    <div class="card laranja">
      <div class="clabel">Não compareceram</div>
      <div class="cval" style="color:#F59E0B">${st.nao_comp_ant}</div>
      <div class="csub">na semana anterior</div>
      ${deltaHtml(-(st.nao_comp_ant - st.nao_comp_hist))}
    </div>
    <div class="card roxo">
      <div class="clabel">Taxa de comparecimento</div>
      <div class="cval" style="color:#8B5CF6">${taxa}</div>
      <div class="csub">semana anterior</div>
      ${deltaHtml(st.delta_taxa,'%')}
    </div>
  </div>`;
}

/* ── Bar chart ── */
function renderBarChart(){
  const h=D.historico;
  if(!h||!h.length)return '<div class="box"><div class="boxh">Evolução semanal</div><div class="nodata">Sem dados</div></div>';
  const max=Math.max(...h.map(x=>x.total),1);
  const bars=h.map((x,i)=>{
    const pct=Math.max(Math.round((x.total/max)*100),2);
    const cls=x.tipo==='cur'?'cur':x.tipo==='ant'?'ant':'hist';
    return `<div class="bbar-wrap">
      <div class="bval">${x.total}</div>
      <div class="bbar ${cls}" style="height:${pct}%"></div>
      <div class="blabel">${esc(x.label)}</div>
    </div>`;
  }).join('');
  return `<div class="box">
    <div class="boxh">Pacientes agendados — últimas 6 semanas</div>
    <div class="bchart">${bars}</div>
    <div class="blegenda">
      <div class="blg-item"><div class="blg-dot" style="background:#4A6FA5"></div>Histórico</div>
      <div class="blg-item"><div class="blg-dot" style="background:#F6AD55"></div>Anterior</div>
      <div class="blg-item"><div class="blg-dot" style="background:#68D391"></div>Atual</div>
    </div>
  </div>`;
}

/* ── Mix ── */
function renderMix(){
  const mix=D.mix_cur;
  if(!mix||!mix.length)return '<div class="box"><div class="boxh">Mix de procedimentos</div><div class="nodata">Sem dados</div></div>';
  const total=mix.reduce((s,m)=>s+m.count,0)||1;
  const items=mix.map(m=>{
    const pct=Math.round((m.count/total)*100);
    return `<div class="mix-item">
      <div class="mix-dot" style="background:${esc(m.cor)}"></div>
      <div class="mix-name">${esc(m.cat)}</div>
      <div class="mix-bar-bg"><div class="mix-bar-fill" style="width:${pct}%;background:${esc(m.cor)}"></div></div>
      <div class="mix-pct">${pct}%</div>
      ${mixDeltaHtml(m.delta)}
    </div>`;
  }).join('');
  return `<div class="box">
    <div class="boxh">Mix — atual vs anterior</div>
    ${items}
    <div style="font-size:10px;color:#718096;margin-top:8px">▲▼ delta vs semana anterior</div>
  </div>`;
}

/* ── Agenda semana atual ── */
function renderAgenda(){
  const appts=D.agenda_cur;
  if(!appts||!appts.length){
    return `<div class="agenda-box">
      <div class="agenda-hdr"><h3>📅 Agenda — Semana Atual</h3><div class="sub">${esc(D.semana_cur.inicio)} → ${esc(D.semana_cur.fim)}</div></div>
      <div class="nodata">Nenhum agendamento</div>
    </div>`;
  }
  // Agrupar por dia
  const byDay={};
  for(const a of appts){
    if(!byDay[a.data])byDay[a.data]=[];
    byDay[a.data].push(a);
  }
  const days=Object.keys(byDay).sort();
  const dayBlocks=days.map(day=>{
    const list=byDay[day].sort((a,b)=>a.horario.localeCompare(b.horario));
    const mins=list.reduce((s,a)=>s+a.duracao,0);
    const apptHtml=list.map(a=>{
      const[dd,mm,yy]=day.split('-');
      return `<div class="appt">
        <div class="appt-dot" style="background:${esc(a.cor)}"></div>
        <div class="appt-time">${esc(a.horario)}</div>
        <div class="appt-dur">${fmtMin(a.duracao)||'—'}</div>
        <div class="appt-name">${esc(a.paciente)}</div>
        <div class="appt-tag" style="${tagStyle(a.cor)}">${esc(a.categoria)}</div>
        <div class="appt-badges">
          ${a.telemedicina?'<span class="bdg bdg-tel">Telemed</span>':''}
          ${a.primeira?'<span class="bdg bdg-1a">1ª</span>':''}
        </div>
      </div>`;
    }).join('');
    return `<div class="day-block">
      <div class="day-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div><span class="day-name">${esc(diaSem(day,true))}</span><span class="day-date">${esc(day.substring(0,5))}</span></div>
        <div class="day-meta"><span><strong>${list.length}</strong> pacientes</span><span><strong>${fmtMin(mins)||'—'}</strong></span></div>
      </div>
      <div class="day-appts">${apptHtml}</div>
    </div>`;
  }).join('');
  const totalMin=appts.reduce((s,a)=>s+a.duracao,0);
  return `<div class="agenda-box">
    <div class="agenda-hdr">
      <h3>📅 Agenda — Semana Atual <span style="color:#68D391">(${appts.length} pacientes)</span></h3>
      <div class="sub">${esc(D.semana_cur.inicio)} → ${esc(D.semana_cur.fim)} · Total: ${fmtMin(totalMin)||'—'}</div>
    </div>
    ${dayBlocks}
  </div>`;
}

/* ── Semana anterior ── */
function renderAnterior(){
  const st=D.stats;
  const byDay=D.ant_por_dia||{};
  const days=Object.keys(byDay).sort();
  const dayCards=days.map(day=>{
    const x=byDay[day];
    return `<div class="ant-day">
      <div class="ant-day-name">${esc(diaSem(day,false))} ${esc(day.substring(0,5))}</div>
      <div class="ant-day-num">${x.total}</div>
      <div class="ant-day-sub">${x.atend} atend. · ${x.nc} faltou</div>
    </div>`;
  }).join('');
  const taxa=st.taxa_ant!=null?`${st.taxa_ant}%`:'—';
  return `<div class="ant-box">
    <div class="boxh">📋 Semana Anterior — ${esc(D.semana_ant.inicio)} → ${esc(D.semana_ant.fim)}</div>
    <div class="ant-grid">
      <div class="ant-stat"><div class="ant-stat-val" style="color:#3B82F6">${st.n_ant}</div><div class="ant-stat-label">Total agendados</div></div>
      <div class="ant-stat"><div class="ant-stat-val" style="color:#10B981">${st.atend_ant}</div><div class="ant-stat-label">Atendidos</div></div>
      <div class="ant-stat"><div class="ant-stat-val" style="color:#EF4444">${st.nao_comp_ant}</div><div class="ant-stat-label">Não compareceram</div></div>
      <div class="ant-stat"><div class="ant-stat-val" style="color:#8B5CF6">${taxa}</div><div class="ant-stat-label">Taxa comparecimento</div></div>
    </div>
    <div class="boxh" style="margin-top:12px">Por dia</div>
    <div class="ant-days">${dayCards||'<div style="color:#718096;font-size:12px">Sem dados por dia</div>'}</div>
  </div>`;
}

/* ── Próxima semana preview ── */
function renderProxima(){
  const n=D.n_prox;
  return `<div class="prox-box">
    <div class="prox-num">${n}</div>
    <div class="prox-info">
      <div class="prox-label">Preview — Próxima Semana</div>
      <div class="prox-period">${esc(D.semana_prox.inicio)} → ${esc(D.semana_prox.fim)}</div>
      <div class="prox-sub">pacientes já agendados para a semana seguinte</div>
    </div>
  </div>`;
}

/* ── Follow-ups ── */
function renderFollowups(){
  const fu=D.followups;
  let inner='';
  if(!fu||!fu.length){
    inner='<div class="fu-empty">✅ Nenhum follow-up pendente esta semana</div>';
  } else {
    inner=fu.map(f=>{
      const msg=`Olá ${f.paciente}! Notamos que você não pôde comparecer na ${f.procedimento} em ${f.data}. Gostaria de remarcar?`;
      const url=f.telefone
        ?`https://wa.me/55${f.telefone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`
        :'https://web.whatsapp.com/';
      return `<div class="fu-item">
        <div class="fu-info">
          <div class="fu-name">${esc(f.paciente)}</div>
          <div class="fu-sub">${esc(f.procedimento)} · ${esc(f.data)}</div>
        </div>
        <a class="btn-wpp" href="${url}" target="_blank" rel="noopener">💬 WhatsApp</a>
      </div>`;
    }).join('');
  }
  return `<div class="fu-box">
    <div class="boxh">📞 Follow-ups urgentes — Não compareceram na semana anterior</div>
    ${inner}
  </div>`;
}

/* ── Render completo ── */
document.getElementById('app').innerHTML=
  renderHeader()+
  renderCards()+
  `<div class="row2">${renderBarChart()}${renderMix()}</div>`+
  `<div class="sec-title" style="margin-bottom:12px">📅 Agenda da Semana Atual</div>`+
  renderAgenda()+
  `<div class="sec-title" style="margin-bottom:12px">📋 Como foi a Semana Anterior</div>`+
  renderAnterior()+
  `<div class="sec-title" style="margin-bottom:12px">🔮 Próxima Semana</div>`+
  renderProxima()+
  `<div class="sec-title" style="margin-bottom:12px">📞 Follow-ups</div>`+
  renderFollowups()+
  `<div class="footer">Atualizado automaticamente todo domingo às 20h &nbsp;·&nbsp; Dados: Feegow API &nbsp;·&nbsp; Clínica Elleva</div>`;
</script>
